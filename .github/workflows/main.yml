name: Daily AI Summary to Google Chat

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch: 

jobs:
  summarize-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Generate AI Summary
        id: ai_summary
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git remote set-head origin --auto
          
          # Get the diff (24h -> 5 commits -> 1 commit)
          DIFF=$(git diff HEAD@{24.hours.ago}..HEAD -- . ':(exclude)package-lock.json' ':(exclude)yarn.lock' 2>/dev/null || git diff HEAD~5 HEAD -- . ':(exclude)package-lock.json' ':(exclude)yarn.lock' 2>/dev/null)
          if [ -z "$DIFF" ]; then DIFF=$(git diff HEAD^ HEAD 2>/dev/null || echo ""); fi

          if [ -z "$DIFF" ]; then
            echo "AI_REPORT=No changes detected in history." >> "$GITHUB_ENV"
          else
            # 1. Define the specific System Prompt as a variable
            # This follows your exact layout request.
            SYSTEM_PROMPT="You are a dev lead. Summarize these code changes EXACTLY in this format:
            ## Layout Components
            filename - description of changes, related sb model / type:
            layoutcomponentname
             |
             | -- fieldname : type

            ## Nested Components
            (Same format as above)

            ## Modified Components
            (Brief bullet points)

            ## Other
            (Any other changes)
            
            Use actual types and field names from the code. If a section is empty, omit it."

            # 2. Build the JSON payload safely using jq
            # This prevents shell escaping errors with the | and -- characters
            JSON_PAYLOAD=$(jq -n \
              --arg sys "$SYSTEM_PROMPT" \
              --arg user "$DIFF" \
              '{model: "gpt-4o-mini", messages: [{role: "system", content: $sys}, {role: "user", content: $user}]}')

            # 3. Call AI
            RESPONSE=$(curl -s -X POST "https://models.inference.ai.azure.com/chat/completions" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $GH_MODELS_TOKEN" \
              -d "$JSON_PAYLOAD")

            # 4. Extract content
            SUMMARY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "AI Error: check Action logs."')
            
            echo "AI_REPORT<<GITHUB_ENV_DELIMITER" >> "$GITHUB_ENV"
            echo "$SUMMARY" >> "$GITHUB_ENV"
            echo "GITHUB_ENV_DELIMITER" >> "$GITHUB_ENV"
          fi

      - name: Post to Google Chat
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
          REPORT: ${{ env.AI_REPORT }}
        run: |
          # Use jq to build the final JSON for Google Chat to keep the tree formatting intact
          PAYLOAD=$(jq -n --arg txt "$REPORT" '{text: $txt}')
          curl -X POST -H "Content-Type: application/json" "$WEBHOOK_URL" -d "$PAYLOAD"
