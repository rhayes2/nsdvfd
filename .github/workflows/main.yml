name: Daily AI Summary to Google Chat

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch: 

jobs:
  summarize-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Generate AI Summary
        id: ai_summary
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: |
          git remote set-head origin --auto
          
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"

          # 1. Get the diff and TRIM it to the first 500 lines to avoid 'Context Window' errors
          DIFF=$(git diff HEAD@{24.hours.ago}..HEAD -- . ':(exclude)package-lock.json' ':(exclude)yarn.lock' 2>/dev/null || git diff HEAD~5 HEAD -- . ':(exclude)package-lock.json' ':(exclude)yarn.lock' 2>/dev/null)
          if [ -z "$DIFF" ]; then DIFF=$(git diff HEAD^ HEAD 2>/dev/null || echo ""); fi
          
          # Only take the first 500 lines of the diff to stay safe and low-cost
          DIFF_TRIMMED=$(echo "$DIFF" | head -n 500)

          if [ -z "$DIFF_TRIMMED" ]; then
            echo "AI_REPORT=No changes detected." >> "$GITHUB_ENV"
          else
            SYSTEM_PROMPT="You are a dev lead. Review the provided code changes.
            Format:
            ### [filename]
            [Short Description] ([SHORT_SHA]($REPO_URL/commit/$SHORT_SHA))"

            # 2. Build the JSON safely
            JSON_PAYLOAD=$(jq -n \
              --arg sys "$SYSTEM_PROMPT" \
              --arg user "$DIFF_TRIMMED" \
              '{model: "gpt-4o-mini", messages: [{role: "system", content: $sys}, {role: "user", content: $user}]}')

            # 3. Call AI and capture the FULL response to the log
            echo "Calling GitHub Models API..."
            RESPONSE=$(curl -s -X POST "https://models.inference.ai.azure.com/chat/completions" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $GH_MODELS_TOKEN" \
              -d "$JSON_PAYLOAD")

            # 4. Check if the response contains an error
            ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.message // empty')
            
            if [ -n "$ERROR_MSG" ]; then
                echo "❌ API ERROR DETECTED: $ERROR_MSG"
                SUMMARY="⚠️ AI Error: $ERROR_MSG"
            else
                SUMMARY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Error: Empty response from AI."')
            fi
            
            echo "AI_REPORT<<GITHUB_ENV_DELIMITER" >> "$GITHUB_ENV"
            echo "$SUMMARY" >> "$GITHUB_ENV"
            echo "GITHUB_ENV_DELIMITER" >> "$GITHUB_ENV"
          fi

      - name: Post to Google Chat
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
          REPORT: ${{ env.AI_REPORT }}
        run: |
          # Robust JSON building for Google Chat
          PAYLOAD=$(jq -n --arg txt "$REPORT" '{text: $txt}')
          curl -X POST -H "Content-Type: application/json" "$WEBHOOK_URL" -d "$PAYLOAD"
