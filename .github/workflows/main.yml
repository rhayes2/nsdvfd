name: Daily AI Summary to Google Chat

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch: 

jobs:
  summarize-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Generate AI Summary
        id: ai_summary
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: |
          # 1. Re-establish the HEAD reference
          git remote set-head origin --auto
          
          # 2. Reverted to your working Diff Logic
          DIFF=$(git diff HEAD@{24.hours.ago}..HEAD -- . ':(exclude)package-lock.json' ':(exclude)yarn.lock' 2>/dev/null || git diff HEAD~5 HEAD -- . ':(exclude)package-lock.json' ':(exclude)yarn.lock' 2>/dev/null)
          
          # 3. Final Fallback
          if [ -z "$DIFF" ]; then
            DIFF=$(git diff HEAD^ HEAD 2>/dev/null || echo "")
          fi

          if [ -z "$DIFF" ]; then
            echo "AI_REPORT=No code changes detected in history. 🧊" >> "$GITHUB_ENV"
          else
            # JSON escape the diff
            CLEAN_DIFF=$(echo "$DIFF" | jq -sRr @json)

            # 4. AI Call (Single line with Dev Lead persona)
            RESPONSE=$(curl -s -X POST "https://models.inference.ai.azure.com/chat/completions" -H "Content-Type: application/json" -H "Authorization: Bearer $GH_MODELS_TOKEN" -d "{\"model\": \"deepseek/DeepSeek-R1-0528\", \"messages\": [{\"role\": \"system\", \"content\": \"You are a dev lead. Summarize these code changes for the team.\"}, {\"role\": \"user\", \"content\": $CLEAN_DIFF}]}")

            # 5. Extract content
            SUMMARY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "AI Error: Check Token or API limits."')
            
            # 6. Safe Environment save
            echo "AI_REPORT<<GITHUB_ENV_DELIMITER" >> "$GITHUB_ENV"
            echo "$SUMMARY" >> "$GITHUB_ENV"
            echo "GITHUB_ENV_DELIMITER" >> "$GITHUB_ENV"
          fi

      - name: Post to Google Chat
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
          REPORT: ${{ env.AI_REPORT }}
        run: |
          # Robust JSON building for Google Chat
          PAYLOAD=$(jq -n --arg txt "*Daily Summary:* \n$REPORT" '{text: $txt}')
          curl -X POST -H "Content-Type: application/json" "$WEBHOOK_URL" -d "$PAYLOAD"
