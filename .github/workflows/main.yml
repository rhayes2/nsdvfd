- name: Generate AI Summary
        id: ai_summary
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: |
          # 1. Fetch changes
          DIFF=$(git diff HEAD~1 HEAD -- 'src/**/*.{js,ts,jsx,tsx,html}' | grep '^\+' | grep -v '+++' || echo "")

          if [ -z "$DIFF" ]; then
            echo "AI_REPORT=No new styles detected today. 🧊" >> "$GITHUB_ENV"
          else
            # 2. Extract classes
            NEW_CLASSES=$(echo "$DIFF" | grep -oE "class(Name)?=\"[^\"]+\"" | sed -E 's/class(Name)?="//;s/"//' | tr ' ' '\n' | sort -u | jq -R . | jq -s .)

            # 3. Call AI with explicit error checking
            RESPONSE=$(curl -s -X POST "https://models.inference.ai.azure.com/chat/completions" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $GH_MODELS_TOKEN" \
              -d "{
                \"model\": \"gpt-4o-mini\",
                \"messages\": [
                  {\"role\": \"system\", \"content\": \"Summarize these new Tailwind classes by category.\"},
                  {\"role\": \"user\", \"content\": \"Classes: $NEW_CLASSES\"}
                ]
              }")

            # 4. Extract content safely
            # Using jq -r ensures we get plain text
            SUMMARY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "AI Error: Could not parse response."')

            # 5. THE FIX: Use a unique delimiter for the Heredoc to avoid conflicts
            echo "AI_REPORT<<GITHUB_ENV_DELIMITER" >> "$GITHUB_ENV"
            echo "$SUMMARY" >> "$GITHUB_ENV"
            echo "GITHUB_ENV_DELIMITER" >> "$GITHUB_ENV"
          fi
