name: Daily AI Summary to Google Chat

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch: 

jobs:
  summarize-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Generate AI Summary
        id: ai_summary
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: |
          # 1. Force the runner to recognize branches
          git fetch --prune --unshallow || git fetch --all

          # 2. THE FIX: Attempt to get the diff. 
          # Try A: Changes in the last 24 hours
          # Try B: If A is empty, get the diff of the last 5 commits
          # Try C: If B is empty, just get the very last commit
          DIFF=$(git diff HEAD@{24.hours.ago}..HEAD -- . ':(exclude)package-lock.json' ':(exclude)yarn.lock' 2>/dev/null || \
                 git diff HEAD~5 HEAD -- . ':(exclude)package-lock.json' ':(exclude)yarn.lock' 2>/dev/null || \
                 git diff HEAD^ HEAD -- . ':(exclude)package-lock.json' ':(exclude)yarn.lock')

          if [ -z "$DIFF" ]; then
            # This only triggers if there is literally 0 history in the repo
            echo "AI_REPORT=No code changes detected in history. 🧊" >> "$GITHUB_ENV"
          else
            # JSON escape the diff
            CLEAN_DIFF=$(echo "$DIFF" | jq -sRr @json)

            # 3. AI Call
            RESPONSE=$(curl -s -X POST "https://models.inference.ai.azure.com/chat/completions" -H "Content-Type: application/json" -H "Authorization: Bearer $GH_MODELS_TOKEN" -d "{\"model\": \"gpt-4o-mini\", \"messages\": [{\"role\": \"system\", \"content\": \"You are a dev lead. Summarize these code changes for the team.\"}, {\"role\": \"user\", \"content\": $CLEAN_DIFF}]}")

            # 4. Extract content
            SUMMARY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "AI Error: Check Token Scope or API limits."')
            
            # 5. Save to Environment
            echo "AI_REPORT<<GITHUB_ENV_DELIMITER" >> "$GITHUB_ENV"
            echo "$SUMMARY" >> "$GITHUB_ENV"
            echo "GITHUB_ENV_DELIMITER" >> "$GITHUB_ENV"
          fi

      - name: Post to Google Chat
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
          REPORT: ${{ env.AI_REPORT }}
        run: |
          # Final check: if REPORT is empty for any reason, provide a fallback
          FINAL_REPORT="${REPORT:-No report generated by AI step. Check Action logs.}"
          PAYLOAD=$(jq -n --arg txt "*Daily Summary:* \n$FINAL_REPORT" '{text: $txt}')
          curl -X POST -H "Content-Type: application/json" "$WEBHOOK_URL" -d "$PAYLOAD"
